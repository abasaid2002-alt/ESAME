<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Amazon Homepage progetto Epicode W2</title>

    <meta name="description" content="Replica della homepage di Amazon." />
    <link rel="stylesheet" href="./assets/css/reset.css" />
    <link rel="stylesheet" href="./assets/css/style.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="./assets/images/logo.png" alt="Logo Amazon" />
      </div>
      <div>
        <nav class="nav">
          <a href="#">All</a>
          <a href="#">Today's deals</a>
          <a href="#">Customer Service</a>
          <a href="#">Registry</a>
          <a href="#">Gift Cards</a>
          <a href="#">Sell</a>
        </nav>
      </div>
    </header>

    <main class="contenuto">
      <section class="uno">
        <p>Shop All Holiday Gift Cards</p>
      </section>

      <section class="due">
        <h1>Holiday Gift Guides</h1>
        <p>Be a go-gifter</p>
      </section>

      <section class="tre">
        <div>
          <div>
            <h2>Find the perfect gift <a href="#">Shop now</a></h2>
          </div>

          <div class="box-card">
            <figure class="card">
              <img src="./assets/images/img_1.jpg" alt="Kindle" />
            </figure>

            <figure class="card">
              <img src="./assets/images/img_2.jpg" alt="Laptop sulla scrivania" />
            </figure>

            <figure class="card">
              <img src="./assets/images/img_3.jpg" alt="Smartwatch" />
            </figure>

            <figure class="card">
              <img src="./assets/images/img_4.jpg" alt="Cane e gatto" />
            </figure>
          </div>
        </div>
      </section>

      <section class="quattro">
        <div class="VR">
          <img src="./assets/images/img_9.png" alt="Visore VR" />
          <p>Play the gifting game <a href="#">Shop gaming</a></p>
        </div>

        <div>
          <img src="./assets/images/img_10.png" alt="Cuffie e speaker" />
          <p>The sound of cheer <a href="#">Shop Audio &amp; Accessories</a></p>
        </div>
      </section>
    </main>

    <section class="back">
      <a href="#">Back to top</a>
    </section>

    <footer class="footer">
      <div class="end"><img src="./assets/images/logo.png" alt="Logo Amazon" /></div>
    </footer>
  </body>
</html>
